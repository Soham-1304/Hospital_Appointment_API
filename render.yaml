# Render Blueprint — monorepo
# Backend: FastAPI served from repo root
# Frontend: Deploy separately via Streamlit Community Cloud (share.streamlit.io)
#           Point it at the /frontend directory.

services:
  - type: web
    name: hospital-api
    runtime: python
    # Render runs from repo root, so imports like `from backend.x import y` work
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hospital-db
          property: connectionString
      - key: APP_NAME
        value: Hospital Appointment System
      - key: DEBUG
        value: "false"
      - key: API_PREFIX
        value: /graphql

databases:
  - name: hospital-db
    databaseName: hospital
    user: hospital_user
